<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Painel Tales</title>

<style>
body{font-family:Arial;background:#0f0f0f;color:white;padding:20px}
h1{color:#ff7a00}
textarea{width:100%;height:120px;border-radius:10px;padding:10px;font-size:16px}
button{background:#ff7a00;border:none;padding:12px 20px;border-radius:10px;font-weight:bold;cursor:pointer;margin:5px}
.card{background:#1a1a1a;padding:15px;border-radius:12px;margin-top:15px}
.total{font-size:22px;color:#ff7a00;font-weight:bold}
.add{color:#7CFC00}
.rem{color:#aaa}
</style>
</head>

<body>

<h1>Painel Tales</h1>

<div class="card">
<h3>Mensagem cliente</h3>
<textarea id="msg"></textarea><br>
<button onclick="processar()">🤖 Processar</button>
<button onclick="entrega()">🚚 Entrega +7</button>
<button onclick="retirada()">🏠 Retirada</button>
</div>

<div class="card">
<h3>Pedido</h3>
<div id="pedido"></div>
<div class="total" id="total"></div>
</div>

<script>
const cardapio={
"americano":29,"acebolado":28,"azeitonado":27,"bacon catupiry":35,"bacon":30,
"burgão bacon":32,"burgão":24,"burguer":22,"catupiry":35,"cheddar":27,
"salada bacon":31,"salada":24,"milho":26,"tudo":37,"da casa":40,
"frango bacon catupiry":38,"frango bacon":34,"frango catupiry":34,"frango cheddar":34,"frango tudo":37,"frango":28,
"bauru acebolado":37,"bauru":35,"misto":22,"calabresa":29,"vegetariano":25,"brocolis":29,
"coca 2l":15,"coca 1l":9,"coca lata":7,"fanta laranja":7,"fanta uva":7,"sprite":7,"guarana":7,"guarana 2l":15,"guarana 1l":9,"dell vale":8
};

const adicionais={
"bacon":7,"catupiry":7,"alface":2,"queijo":7,"ovo":2,"hamburguer":6,"milho":2,"azeitona":2,"maionese":1,"cebola":2,"frango":6
};

let totalValor=0;
let entregaValor=0;

function getQtd(txt,item){
let r=txt.match(new RegExp("(\\d+)\\s*"+item));
return r?parseInt(r[1]):1;
}

function processar(){
totalValor=0;
let txt=document.getElementById("msg").value.toLowerCase();
let html="";

for(let item in cardapio){
if(txt.includes(item)){
let qtd=getQtd(txt,item);
let valor=cardapio[item]*qtd;
totalValor+=valor;

let linha=`<div>${qtd}x ${item} — R$ ${valor}`;

for(let add in adicionais){
if(txt.includes("extra "+add)||txt.includes("com "+add)||txt.includes("+"+add)){
let v=adicionais[add]*qtd;
totalValor+=v;
linha+=`<div class='add'>+ ${add} R$ ${v}</div>`;
}
if(txt.includes("sem "+add)||txt.includes("tirar "+add)){
linha+=`<div class='rem'>- sem ${add}</div>`;
}
}

linha+="</div>";
html+=linha;
}
}

document.getElementById("pedido").innerHTML=html;
mostrarTotal();
}

function entrega(){entregaValor=7;mostrarTotal();}
function retirada(){entregaValor=0;mostrarTotal();}

function mostrarTotal(){
document.getElementById("total").innerText="TOTAL: R$ "+(totalValor+entregaValor);
}
</script>

</body>
</html>
