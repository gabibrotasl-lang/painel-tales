<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Painel Tales Print</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
  padding:20px;
}

textarea{
  width:100%;
  height:140px;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
  font-size:14px;
}

button{
  background:#ff7a00;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:10px;
}

#print{
  background:#fff;
  color:#000;
  padding:10px;
  border-radius:8px;
  white-space:pre-line;
  font-size:14px;
}
</style>
</head>

<body>

<h2>Painel Tales — Impressão</h2>

<textarea id="input" placeholder="Cole aqui o pedido organizado pelo chat..."></textarea>

<button onclick="mostrar()">Colar no painel</button>
<button onclick="window.print()">Imprimir</button>
<button onclick="novo()">Novo pedido</button>

<div id="print"></div>

<script>
function mostrar(){
  const texto = document.getElementById("input").value;
  document.getElementById("print").innerText = texto;
}

function novo(){
  document.getElementById("input").value="";
  document.getElementById("print").innerText="";
}
</script>

</body>
</html>
