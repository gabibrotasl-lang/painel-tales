<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Tales PRO</title>

<style>
body{font-family:Arial;background:#0f0f0f;color:#fff;padding:20px}
h1{color:#ff7a00}
textarea{width:100%;height:120px;border-radius:10px;padding:10px;font-size:16px}
button{background:#ff7a00;border:none;padding:12px 20px;border-radius:10px;font-weight:bold;margin:5px;cursor:pointer}
.card{background:#1a1a1a;padding:15px;border-radius:12px;margin-top:15px}
.total{font-size:22px;color:#ff7a00;font-weight:bold}
.linhaPreco{color:#aaa;font-size:13px}
.add{color:#7CFC00}
.rem{color:#aaa}
.small{color:#aaa;font-size:13px}
</style>
</head>

<body>

<h1>Painel Tales</h1>

<div class="card">
<h3>Mensagem cliente</h3>
<textarea id="msg"></textarea><br>
<button onclick="colar()">📋 Colar</button>
<button onclick="processar()">🤖 Processar IA</button>
<button onclick="entrega()">🚚 Entrega +7</button>
<button onclick="retirada()">🏠 Retirada</button>
<button onclick="imprimir()">🧾 Imprimir</button>
</div>

<div class="card">
<h3>Pedido</h3>
<div id="pedido"></div>
<div id="endereco" class="small"></div>
<div id="total" class="total"></div>
</div>

<script>
let numeroPedido=1;

const cardapio=[
["frango bacon catupiry",38],["frango bacon",34],["frango catupiry",34],["frango cheddar",34],["frango tudo",37],
["da casa",40],["bacon catupiry",35],["burgão bacon",32],["salada bacon",31],["bauru acebolado",37],
["americano",29],["acebolado",28],["azeitonado",27],["bacon",30],["burgão",24],["burguer",22],
["catupiry",35],["cheddar",27],["salada",24],["milho",26],["tudo",37],["frango",28],
["bauru",35],["misto",22],["calabresa",29],["vegetariano",25],["brocolis",29],
["coca 2l",15],["coca 1l",9],["coca lata",7],["fanta laranja",7],["fanta uva",7],
["sprite",7],["guarana 2l",15],["guarana 1l",9],["guarana",7],["dell vale",8]
];

const adicionais={"bacon":7,"catupiry":7,"alface":2,"queijo":7,"ovo":2,"hamburguer":6,"milho":2,"azeitona":2,"maionese":1,"cebola":2,"frango":6};

let itens=[];
let total=0;
let entregaValor=0;
let endereco="";

function colar(){navigator.clipboard.readText().then(t=>msg.value=t)}

function detectarEndereco(txt){
let linhas=txt.split("\n");
for(let l of linhas){
if(l.match(/rua|av|avenida|travessa/i)&&l.match(/\d+/)) return l;
}
return "";
}

function acharQtd(txt,pos){
let antes=txt.substring(Math.max(0,pos-6),pos);
let m=antes.match(/(\d+)/);
return m?parseInt(m[1]):1;
}

function processar(){
itens=[];total=0;
let txt=msg.value.toLowerCase();
endereco=detectarEndereco(txt);

for(let [nome,preco] of cardapio){
let idx=0;
while((idx=txt.indexOf(nome,idx))!==-1){
let qtd=acharQtd(txt,idx);
let item={nome,qtd,preco,adds:[],rems:[]};

for(let add in adicionais){
let trecho=txt.substring(idx,idx+45);
if(trecho.includes("extra "+add)||trecho.includes("+"+add)||trecho.includes("com "+add)){
item.adds.push(add);
total+=adicionais[add]*qtd;
}
if(trecho.includes("sem "+add)||trecho.includes("tirar "+add)){
item.rems.push(add);
}
}

itens.push(item);
total+=preco*qtd;
idx+=nome.length;
}
}
render();
}

function render(){
let html="";
itens.forEach(i=>{
let subtotal=i.preco*i.qtd;
html+=`<div>${i.qtd}x ${i.nome}<div class="linhaPreco">R$ ${subtotal}</div>`;
i.adds.forEach(a=>{
let v=adicionais[a]*i.qtd;
html+=`<div class="add">+ ${a} R$ ${v}</div>`;
});
i.rems.forEach(r=>html+=`<div class="rem">- sem ${r}</div>`);
html+="</div>";
});
pedido.innerHTML=html;
enderecoEl.innerText=endereco?"Endereço: "+endereco:"";
mostrarTotal();
}

function entrega(){entregaValor=7;mostrarTotal()}
function retirada(){entregaValor=0;mostrarTotal()}

function mostrarTotal(){
totalEl.innerText="TOTAL: R$ "+(total+entregaValor);
}

function imprimir(){
let agora=new Date();
let texto="TALES LANCHES\n";
texto+="Pedido #"+numeroPedido+"\n";
texto+=agora.toLocaleString()+"\n";
texto+="----------------\n\n";

itens.forEach(i=>{
texto+=`${i.qtd}x ${i.nome}\n`;
i.adds.forEach(a=>texto+=` + ${a}\n`);
i.rems.forEach(r=>texto+=` - sem ${r}\n`);
texto+="\n";
});

texto+="----------------\n";
if(entregaValor>0) texto+=`Entrega: R$ ${entregaValor}\n`;
texto+=`\nTOTAL: R$ ${total+entregaValor}\n\n`;
if(endereco) texto+="Endereço:\n"+endereco+"\n";

let w=window.open("","","width=300,height=600");
w.document.write("<pre style='font-size:14px'>"+texto+"</pre>");
w.print();
w.close();

numeroPedido++;
}
</script>

</body>
</html>
